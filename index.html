<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日打卡系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="page active">
        <div class="container">
            <div class="card">
                <h1>📅 每日打卡</h1>
                <p class="subtitle">请登录后打卡</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">登录</button>
                    
                    <p id="loginError" class="error-msg"></p>
                </form>
                
                <div class="footer-links">
                    <a href="admin.html">管理员登录</a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 打卡页面 -->
    <div id="clockPage" class="page">
        <div class="container">
            <div class="header">
                <div class="user-info">
                    <span id="welcomeUser">欢迎，用户</span>
                    <button id="logoutBtn" class="btn btn-sm btn-outline">退出</button>
                </div>
            </div>
            
            <div class="card clock-card">
                <div class="current-time">
                    <div class="date" id="currentDate"></div>
                    <div class="time" id="currentTime"></div>
                </div>
                
                <div class="clock-status" id="clockStatus">
                    <p>今日状态：<span id="todayStatus">未打卡</span></p>
                </div>
                
                <div class="clock-actions">
                    <button id="clockInBtn" class="btn btn-success btn-lg">
                        <span class="btn-icon">⏰</span>
                        <span>上班打卡</span>
                    </button>
                    <button id="clockOutBtn" class="btn btn-danger btn-lg" disabled>
                        <span class="btn-icon">🏠</span>
                        <span>下班打卡</span>
                    </button>
                </div>
                
                <div id="clockMsg" class="msg"></div>
            </div>
            
            <div class="card">
                <h2>📊 今日打卡记录</h2>
                <div id="todayRecords" class="records">
                    <p class="no-data">暂无打卡记录</p>
                </div>
            </div>
            
            <div class="card">
                <h2>📅 本周打卡记录</h2>
                <div id="weekRecords" class="records">
                    <p class="no-data">暂无打卡记录</p>
                </div>
            </div>
            
            <div class="card">
                <h2>🏆 连续打卡</h2>
                <div class="streak-info">
                    <div class="streak-number">
                        <span id="streakCount">0</span>
                        <span class="streak-label">天</span>
                    </div>
                    <p>继续加油！保持打卡习惯</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
